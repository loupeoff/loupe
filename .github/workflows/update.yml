name: Update feed and deploy

on:
  schedule:
    - cron: "5 * * * *"     # toutes les heures à min 5
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run aggregator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SITE_URL: ${{ vars.SITE_URL || format('https://{0}.github.io/{1}', github.repository_owner, github.event.repository.name) }}
        run: python script/aggregate.py

     - name: Commit updated feed
        run: |
          git config user.name  "loupe-bot"
          git config user.email "bot@loupe.local"
          git add site/feed.json site/feed.xml
          if git diff --cached --quiet; then
            echo "Pas de changement."
          else
            git commit -m "feed: $(date -u +'%Y-%m-%d %H:%M UTC')"
            # Tentatives avec rebase en cas de conflit (autre workflow en parallèle)
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "Tentative $i échouée, on réessaie dans 5s"
              sleep 5
            done
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: update-feed
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
